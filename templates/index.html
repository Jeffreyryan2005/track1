<!DOCTYPE html>
<html>
<head>
<title>AI Chat</title>
<style>
body {
  margin:0;
  background:#0b0b0f;
  color:white;
  font-family: 'Segoe UI', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:700px;
}

h1 {
  font-size:28px;
  margin-bottom:20px;
}

textarea {
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:#1c1c22;
  color:white;
  font-size:16px;
  outline:none;
}

button {
  margin-top:12px;
  padding:12px 24px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  opacity:0.8;
}

.output {
  margin-top:20px;
  background:#141417;
  padding:18px;
  border-radius:14px;
  min-height:60px;
  white-space:pre-wrap;
}

.loader {
  margin-top:10px;
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
  <h1>✨ AI Chat (Groq)</h1>

  <textarea id="prompt" placeholder="Ask anything..."></textarea>

  <button onclick="sendMessage()">Send</button>

  <div class="loader" id="loader"></div>
  <div id="output" class="output"></div>
</div>

<script>
async function sendMessage() {
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");
  const loader = document.getElementById("loader");

  if (!prompt) {
    alert("Enter something!");
    return;
  }

  loader.innerText = "⏳ Thinking...";
  output.innerText = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    console.log(data); // DEBUG

    output.innerText = data.response || "No response";
  } catch (err) {
    console.error(err);
    output.innerText = "Error: " + err.message;
  }

  loader.innerText = "";
}
</script>

</body>
</html>
